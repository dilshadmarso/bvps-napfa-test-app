<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><meta name="theme-color" content="#173b73"><title>BVPS View Results</title>
<style>
:root{--navy:#173b73;--navy2:#102b56;--green:#23875d;--greenBg:#ddf7ea;--amber:#956000;--amberBg:#fff1cf;--red:#bd3748;--redBg:#ffe7eb;--bg:#f5f7fb;--card:#fff;--line:#dce1e8;--muted:#687386;--text:#263142;--shadow:0 6px 20px rgba(20,39,73,.10)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}button,input,select{font:inherit}.hidden{display:none!important}.page{max-width:1250px;margin:auto;padding:10px;padding-bottom:calc(20px + env(safe-area-inset-bottom))}.topbar{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;margin-bottom:10px}.navbtn,.btn{border:0;border-radius:12px;min-height:46px;padding:10px 14px;font-weight:800;cursor:pointer}.navbtn{background:#fff;color:var(--navy);box-shadow:var(--shadow)}.title{text-align:center;font-weight:900;color:var(--navy)}.hero{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:18px;border-radius:20px;box-shadow:var(--shadow);margin-bottom:12px}.hero h1{margin:0;font-size:24px}.hero p{margin:6px 0 0;font-size:13px;opacity:.9}.panel{background:#fff;padding:15px;border-radius:18px;box-shadow:var(--shadow);margin-bottom:12px}.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;align-items:end}.field label{display:block;font-size:13px;font-weight:800;margin-bottom:5px}.field select,.search{width:100%;min-height:46px;border:1px solid var(--line);border-radius:11px;padding:10px;background:#fff;font-size:16px}.btn-primary{background:var(--navy);color:#fff}.btn-secondary{background:#eef1f5;color:var(--navy)}.summary{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.sum{background:var(--bg);border-radius:13px;padding:10px;text-align:center}.sum strong{display:block;color:var(--navy);font-size:24px}.sum span{font-size:10px;font-weight:800;color:var(--muted)}.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.controls .search{flex:1;min-width:200px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px}table{width:100%;min-width:1150px;border-collapse:collapse}th,td{padding:9px;border-bottom:1px solid var(--line);font-size:12px;text-align:left;vertical-align:middle}th{background:#eef1f5;color:var(--navy);position:sticky;top:0}.score{font-weight:900}.grade,.award{display:inline-block;border-radius:999px;padding:4px 8px;font-weight:900;font-size:11px}.gA,.gB,.gC{background:var(--greenBg);color:var(--green)}.gD,.gE{background:var(--amberBg);color:var(--amber)}.gF,.missing{background:var(--redBg);color:var(--red)}.gold{background:#fff0b8;color:#7d5900}.silver{background:#e6e9ed;color:#53606d}.bronze{background:#f7e2ce;color:#9a5b20}.none{background:var(--redBg);color:var(--red)}.cards{display:flex;flex-direction:column;gap:10px}.card{border:2px solid var(--line);border-radius:17px;padding:13px}.card.incomplete{border-color:var(--amber)}.cardhead{display:grid;grid-template-columns:48px 1fr auto;gap:8px;align-items:center}.reg{font-size:25px;font-weight:900;color:var(--navy);text-align:center}.name{font-weight:900}.meta{font-size:11px;color:var(--muted);margin-top:3px}.station-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:10px}.station{background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:8px;text-align:center}.station small{display:block;min-height:25px;color:var(--muted);font-weight:800}.station b{display:block;margin:3px 0}.details{margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}.detailrow{display:grid;grid-template-columns:1.2fr .8fr .5fr 1.5fr;gap:7px;padding:7px 0;border-bottom:1px solid var(--line);font-size:11px}.message{min-height:18px;font-weight:800;font-size:13px;margin-top:8px}.overlay{position:fixed;inset:0;background:rgba(15,28,48,.58);display:flex;align-items:center;justify-content:center;z-index:9999}.loadcard{background:#fff;border-radius:18px;padding:22px;text-align:center;min-width:250px}.spinner{width:42px;height:42px;border:5px solid var(--line);border-top-color:var(--navy);border-radius:50%;margin:0 auto 12px;animation:spin .75s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){.grid4{grid-template-columns:repeat(2,1fr)}.summary{grid-template-columns:repeat(4,1fr)}}@media(max-width:650px){.grid4{grid-template-columns:1fr}.summary{grid-template-columns:repeat(2,1fr)}.desktop{display:none!important}.station-grid{grid-template-columns:repeat(3,1fr)}}@media(min-width:651px){.mobile{display:none!important}}@media(max-width:390px){.station-grid{grid-template-columns:repeat(2,1fr)}.detailrow{grid-template-columns:1fr}.navbtn{padding:8px 9px;font-size:12px}.title{font-size:12px}}
</style>
</head>
<body>
<div id="loading" class="overlay hidden"><div class="loadcard"><div class="spinner"></div><strong id="loadingText">Loading…</strong></div></div>
<main class="page">
<nav class="topbar"><button class="navbtn" onclick="location.href='index.html'">← Home</button><div class="title">View Results</div><button class="navbtn" onclick="history.length>1?history.back():location.href='index.html'">Back</button></nav>
<header class="hero"><h1>BVPS NAPFA Results</h1><p>Raw scores, grades, points, awards and next-grade targets.</p></header>
<section class="panel"><div class="grid4"><div class="field"><label>Date</label><select id="date"><option value="">Select date</option></select></div><div class="field"><label>Level</label><select id="level" onchange="updateClasses()"><option value="">Select level</option></select></div><div class="field"><label>Class</label><select id="class"><option value="">Select class</option></select></div><button class="btn btn-primary" onclick="loadResults()">View Results</button></div><div id="message" class="message"></div></section>
<section id="summaryPanel" class="panel hidden"><div class="summary"><div class="sum"><strong id="sTotal">0</strong><span>Pupils</span></div><div class="sum"><strong id="sComplete">0</strong><span>Complete</span></div><div class="sum"><strong id="sIncomplete">0</strong><span>Incomplete</span></div><div class="sum"><strong id="sGold">0</strong><span>Gold</span></div><div class="sum"><strong id="sSilver">0</strong><span>Silver</span></div><div class="sum"><strong id="sBronze">0</strong><span>Bronze</span></div><div class="sum"><strong id="sNone">0</strong><span>No Award</span></div></div></section>
<section id="resultsPanel" class="panel hidden"><div class="controls"><input id="search" class="search" placeholder="Search pupil" oninput="filterResults()"><select id="awardFilter" class="search" onchange="filterResults()"><option value="">All awards</option><option>Gold</option><option>Silver</option><option>Bronze</option><option>No Award</option></select><button class="btn btn-secondary" onclick="loadResults()">Refresh Results</button><button class="btn btn-secondary desktop" onclick="setView('table')">Table</button><button class="btn btn-secondary" onclick="setView('cards')">Cards</button></div><div id="tableView" class="desktop table-wrap"><table><thead><tr><th>No.</th><th>Name</th><th>Sit-ups</th><th>Broad Jump</th><th>Sit & Reach</th><th>Inclined Pull-up</th><th>Shuttle Run</th><th>1.6 km Run</th><th>Points</th><th>Award</th><th>Status</th><th>Details</th></tr></thead><tbody id="tbody"></tbody></table></div><div id="cardView" class="mobile cards"></div><div id="empty" class="message hidden">No matching pupils.</div></section>
</main><script src="view-results.js"></script>
</body></html>
